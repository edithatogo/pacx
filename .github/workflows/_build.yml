name: PACX Build

on:
  workflow_call:
    inputs:
      os:
        description: Runner OS to use
        required: false
        type: string
        default: ubuntu-latest
      solution_path:
        description: Path to the solution file
        required: false
        type: string
        default: Greg.Xrm.Command/Greg.Xrm.Command.sln
      dotnet_version:
        description: .NET SDK version to use
        required: false
        type: string
        default: 11.0.100-preview.3.26207.106
      collect_coverage:
        description: Collect Cobertura coverage from the Windows matrix leg
        required: false
        type: boolean
        default: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Clear stale SDK overrides
        shell: pwsh
        run: Remove-Item Env:MSBuildSDKsPath -ErrorAction SilentlyContinue

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
          cache: true
          cache-dependency-path: |
            Greg.Xrm.Command/Directory.Build.props
            Greg.Xrm.Command/**/*.csproj
            **/packages.lock.json
            global.json

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.solution_path }}

      - name: Build
        run: dotnet build ${{ inputs.solution_path }} --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          $testArgs = @(
            "${{ inputs.solution_path }}",
            "--configuration", "Release",
            "--no-build",
            "--verbosity", "normal"
          )

          if (${{ inputs.collect_coverage }} -and "${{ inputs.os }}" -eq "windows-latest") {
            $coverageRoot = Join-Path $env:RUNNER_TEMP "coverage-results"
            $testArgs += "--collect"
            $testArgs += "XPlat Code Coverage"
            $testArgs += "--settings"
            $testArgs += "Greg.Xrm.Command/Greg.Xrm.Command.Core.TestSuite/CodeCoverage.runsettings"
            $testArgs += "--results-directory"
            $testArgs += $coverageRoot
          }

          dotnet test @testArgs

      - name: Stage coverage artifact
        if: ${{ inputs.collect_coverage && inputs.os == 'windows-latest' }}
        shell: pwsh
        run: |
          $coverageRoot = Join-Path $env:RUNNER_TEMP "coverage-results"
          $coverageFile = Get-ChildItem -Path $coverageRoot -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if (-not $coverageFile) {
            throw "No coverage.cobertura.xml file was produced under $coverageRoot."
          }

          $artifactRoot = Join-Path $env:RUNNER_TEMP "coverage-artifact"
          if (Test-Path -LiteralPath $artifactRoot) {
            Remove-Item -LiteralPath $artifactRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $artifactRoot | Out-Null
          Copy-Item -LiteralPath $coverageFile.FullName -Destination (Join-Path $artifactRoot "coverage.cobertura.xml") -Force

      - name: Upload coverage artifact
        if: ${{ inputs.collect_coverage && inputs.os == 'windows-latest' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-cobertura
          if-no-files-found: error
          retention-days: 7
          path: ${{ runner.temp }}/coverage-artifact/coverage.cobertura.xml

      - name: Lint
        run: dotnet format ${{ inputs.solution_path }} --verify-no-changes
