name: Auto-merge Dependencies
on:
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-merge eligible Dependabot update
    permissions:
      contents: write # Required for Dependabot auto-merge.
      pull-requests: write # Required to enable the merge queue.
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'dependencies') &&
      (contains(github.event.pull_request.labels.*.name, 'version-update:semver-patch') ||
       contains(github.event.pull_request.labels.*.name, 'version-update:semver-minor'))
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
