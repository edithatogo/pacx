name: Benchmark Comparison
on:
  pull_request:
    paths:
      - 'Greg.Xrm.Command/**/*.cs'
      - 'Greg.Xrm.Command/**/*.csproj'

jobs:
  benchmark:
    name: Compare performance benchmarks
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write # Required to post benchmark results.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 11.0.100-preview.3.26207.106

      - name: Clear stale SDK overrides
        shell: pwsh
        run: Remove-Item Env:MSBuildSDKsPath -ErrorAction SilentlyContinue

      - name: Run startup benchmarks (PR branch)
        run: dotnet run --configuration Release --project Greg.Xrm.Command/test/Greg.Xrm.Command.Benchmark/Greg.Xrm.Command.Benchmark.csproj -- --filter '*Startup*' --exporters json --artifacts .benchmarks/pr

      - name: Run core hot-path benchmarks (PR branch)
        run: dotnet run --configuration Release --project Greg.Xrm.Command/Greg.Xrm.Command.Core.Benchmarks/Greg.Xrm.Command.Core.Benchmarks.csproj -- --exporters json --artifacts .benchmarks/pr

      - name: Checkout main branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          ref: main
          path: main-baseline

      - name: Run startup benchmarks (main baseline)
        run: dotnet run --configuration Release --project main-baseline/Greg.Xrm.Command/test/Greg.Xrm.Command.Benchmark/Greg.Xrm.Command.Benchmark.csproj -- --filter '*Startup*' --exporters json --artifacts .benchmarks/main

      - name: Run core hot-path benchmarks (main baseline)
        run: dotnet run --configuration Release --project main-baseline/Greg.Xrm.Command/Greg.Xrm.Command.Core.Benchmarks/Greg.Xrm.Command.Core.Benchmarks.csproj -- --exporters json --artifacts .benchmarks/main

      - name: Compare benchmark results
        shell: pwsh
        run: |
          $threshold = 5.0
          $regressions = @()
          $baselineDir = ".benchmarks/main"
          $prDir = ".benchmarks/pr"

          $baselineFiles = Get-ChildItem -Path $baselineDir -Recurse -Filter "*.json" | Where-Object { $_.Name -like "*-report.json" -or $_.Name -like "*-summary.json" }
          $prFiles = Get-ChildItem -Path $prDir -Recurse -Filter "*.json" | Where-Object { $_.Name -like "*-report.json" -or $_.Name -like "*-summary.json" }

          foreach ($prFile in $prFiles) {
            $baselineFile = $baselineFiles | Where-Object { $_.Name -eq $prFile.Name } | Select-Object -First 1
            if (-not $baselineFile) {
              Write-Host "Warning: No matching baseline for $($prFile.Name)"
              continue
            }

            try {
              $prData = Get-Content $prFile.FullName -Raw | ConvertFrom-Json
              $baselineData = Get-Content $baselineFile.FullName -Raw | ConvertFrom-Json
            } catch {
              Write-Host "Warning: Could not parse $($prFile.Name) as JSON — skipping"
              continue
            }

            $prBenchmarks = $prData.Benchmarks
            $baselineBenchmarks = $baselineData.Benchmarks
            if (-not $prBenchmarks -or -not $baselineBenchmarks) { continue }

            foreach ($prBench in $prBenchmarks) {
              $baselineBench = $baselineBenchmarks | Where-Object { $_.FullName -eq $prBench.FullName } | Select-Object -First 1
              if (-not $baselineBench -or -not $prBench.Statistics -or -not $baselineBench.Statistics) { continue }

              $prMean = [double]$prBench.Statistics.Mean
              $baselineMean = [double]$baselineBench.Statistics.Mean
              if ($baselineMean -eq 0) { continue }

              $change = [math]::Round(($prMean - $baselineMean) / $baselineMean * 100, 2)
              $symbol = if ($change -gt $threshold) { "❌" } elseif ($change -lt (-1 * $threshold)) { "✅" } else { "✓" }

              Write-Host "$symbol $($prBench.FullName): baseline=$([math]::Round($baselineMean, 2))ns pr=$([math]::Round($prMean, 2))ns change=$change%"

              if ($change -gt $threshold) {
                $regressions += "$($prBench.FullName) regressed by $change% (threshold: $threshold%)"
              }
            }
          }

          if ($regressions.Count -gt 0) {
            Write-Host "::warning::$($regressions.Count) benchmark(s) exceeded the $threshold% regression threshold"
            $regressions | ForEach-Object { Write-Host "::error::Regression: $_" }
            exit 1
          }

          Write-Host "All benchmarks within the $threshold% regression threshold."

      - name: Post benchmark comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: pwsh
        run: |
          $baselineDir = ".benchmarks/main"
          $prDir = ".benchmarks/pr"

          $baselineFiles = Get-ChildItem -Path $baselineDir -Recurse -Filter "*.json" | Where-Object { $_.Name -like "*-report.json" -or $_.Name -like "*-summary.json" }
          $prFiles = Get-ChildItem -Path $prDir -Recurse -Filter "*.json" | Where-Object { $_.Name -like "*-report.json" -or $_.Name -like "*-summary.json" }

          $rows = @()
          $hasRegression = $false

          foreach ($prFile in $prFiles) {
            $baselineFile = $baselineFiles | Where-Object { $_.Name -eq $prFile.Name } | Select-Object -First 1
            if (-not $baselineFile) { continue }

            try {
              $prData = Get-Content $prFile.FullName -Raw | ConvertFrom-Json
              $baselineData = Get-Content $baselineFile.FullName -Raw | ConvertFrom-Json
            } catch { continue }

            $prBenchmarks = $prData.Benchmarks
            $baselineBenchmarks = $baselineData.Benchmarks
            if (-not $prBenchmarks -or -not $baselineBenchmarks) { continue }

            foreach ($prBench in $prBenchmarks) {
              $baselineBench = $baselineBenchmarks | Where-Object { $_.FullName -eq $prBench.FullName } | Select-Object -First 1
              if (-not $baselineBench -or -not $prBench.Statistics -or -not $baselineBench.Statistics) { continue }

              $prMean = [double]$prBench.Statistics.Mean
              $baselineMean = [double]$baselineBench.Statistics.Mean
              if ($baselineMean -eq 0) { continue }

              $change = [math]::Round(($prMean - $baselineMean) / $baselineMean * 100, 2)
              if ($change -gt 5.0) { $hasRegression = $true }
              $emoji = if ($change -gt 5.0) { "❌" } elseif ($change -lt -5.0) { "✅" } else { "✓" }
              $rows += "| $emoji $($prBench.FullName) | $([math]::Round($baselineMean, 2)) ns | $([math]::Round($prMean, 2)) ns | $change% |"
            }
          }

          $summary = if ($hasRegression) { "⚠️ Some benchmarks exceeded the 5% regression threshold." } else { "✅ All benchmarks within threshold." }

          $body = @"
          ## Benchmark Results

          | Benchmark | Baseline (main) | PR Branch | Change |
          |---|---|---|---|
          $($rows -join "`n")

          **$summary**
          "@

          gh pr comment "$env:PR_NUMBER" --body "$body"
