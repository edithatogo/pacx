name: Enforce Branch Protection
on:
  pull_request:
    types: [opened, synchronize, edited]

permissions:
  contents: read

concurrency:
  group: branch-protection-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Require merge queue for protected branches
    runs-on: ubuntu-latest
    steps:
      - name: Require merge queue for main
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$BASE_REF" == "main" || "$BASE_REF" == "master" ]]; then
            echo "PR targets main/master — merge queue is required."
            echo "Use merge queue button, not direct merge."
          fi
