name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # Required to upload the Pages artifact.
      id-token: write # Required by GitHub Pages deployment.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 11.0.100-preview.3.26207.106
      - name: Install DocFX
        run: dotnet tool update -g docfx
      - name: Generate command reference
        shell: pwsh
        run: ./scripts/generate-command-docs.ps1
      - name: Build docs
        run: docfx docs/docfx.json
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        if: github.event_name == 'push'
        with:
          path: docs/_build

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # Required to deploy GitHub Pages.
      id-token: write # Required by GitHub Pages deployment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
