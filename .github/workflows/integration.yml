name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '30 17 * * *'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  dataverse:
    name: Dataverse integration tests
    runs-on: ubuntu-latest
    environment: integration
    timeout-minutes: 45
    env:
      PACX_INTEGRATION_ENV_URL: ${{ secrets.PACX_INTEGRATION_ENV_URL }}
      PACX_INTEGRATION_CLIENT_ID: ${{ secrets.PACX_INTEGRATION_CLIENT_ID }}
      PACX_INTEGRATION_TENANT_ID: ${{ secrets.PACX_INTEGRATION_TENANT_ID }}
      PACX_INTEGRATION_CLIENT_SECRET: ${{ secrets.PACX_INTEGRATION_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 11.0.100-preview.3.26207.106
          cache: true

      - name: Restore
        run: dotnet restore Greg.Xrm.Command/Greg.Xrm.Command.sln

      - name: Skip when integration environment is not configured
        if: env.PACX_INTEGRATION_ENV_URL == ''
        run: echo "PACX_INTEGRATION_ENV_URL is not configured; skipping integration suite."

      - name: Run integration tests
        if: env.PACX_INTEGRATION_ENV_URL != ''
        run: dotnet test Greg.Xrm.Command/Greg.Xrm.Command.Core.TestSuite/Greg.Xrm.Command.Core.TestSuite.csproj --no-restore --filter "TestCategory=Integration"
