name: Mutation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'

permissions:
  contents: read

jobs:
  stryker:
    name: Stryker.NET
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.100-preview.3.26207.106
          cache: true

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore Greg.Xrm.Command/Greg.Xrm.Command.sln

      - name: Run mutation tests
        run: dotnet stryker --config-file stryker-config.json

      - name: Upload Stryker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: StrykerOutput/**/*
          if-no-files-found: ignore
