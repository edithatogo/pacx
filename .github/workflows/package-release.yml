name: PACX Package Release

on:
  workflow_call:
    inputs:
      package_path:
        description: Path to a PACX package folder or .pacx file
        required: true
        type: string
      destination:
        description: Destination folder for staged release artifacts
        required: true
        type: string
      tag_name:
        description: Optional Git tag to publish as a GitHub Release
        required: false
        type: string
  workflow_dispatch:
    inputs:
      package_path:
        description: Path to a PACX package folder or .pacx file
        required: true
        default: conductor/release-package
        type: string
      destination:
        description: Destination folder for staged release artifacts
        required: true
        default: ./release-artifacts
        type: string
      tag_name:
        description: Optional Git tag to publish as a GitHub Release
        required: false
        default: ""
        type: string

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      solution_path: Greg.Xrm.Command/Greg.Xrm.Command.sln
      dotnet_version: 11.0.100-preview.3.26207.106

  release-package:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Clear stale SDK overrides
        shell: pwsh
        run: Remove-Item Env:MSBuildSDKsPath -ErrorAction SilentlyContinue

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Greg.Xrm.Command/Greg.Xrm.Command.sln

      - name: Prepare package source
        id: prepare_source
        shell: pwsh
        env:
          PACKAGE_PATH_INPUT: ${{ inputs.package_path }}
        run: |
          $packagePath = $env:PACKAGE_PATH_INPUT
          $isRepoReleaseBundle = [string]::Equals($packagePath, "conductor/release-package", [System.StringComparison]::OrdinalIgnoreCase)

          if ($isRepoReleaseBundle) {
            $stagingRoot = Join-Path $env:RUNNER_TEMP "pacx-release-source"
            if (Test-Path -LiteralPath $stagingRoot) {
              Remove-Item -LiteralPath $stagingRoot -Recurse -Force
            }

            New-Item -ItemType Directory -Path $stagingRoot | Out-Null
            Copy-Item -LiteralPath $packagePath -Destination $stagingRoot -Recurse -Force
            $packagePath = Join-Path $stagingRoot "release-package"
          }

          "package_source=$packagePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_repo_release_bundle=$isRepoReleaseBundle" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Derive release version
        shell: pwsh
        env:
          TAG_NAME_INPUT: ${{ inputs.tag_name }}
          PACKAGE_SOURCE: ${{ steps.prepare_source.outputs.package_source }}
        run: |
          $version = $env:TAG_NAME_INPUT
          if ([string]::IsNullOrWhiteSpace($version)) {
            $manifest = Get-Content -LiteralPath (Join-Path $env:PACKAGE_SOURCE "pacx.package.json") -Raw | ConvertFrom-Json
            $version = $manifest.version
          }

          $version = $version.TrimStart('v')
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Stamp release metadata
        if: steps.prepare_source.outputs.is_repo_release_bundle == 'True'
        shell: pwsh
        env:
          PACKAGE_SOURCE: ${{ steps.prepare_source.outputs.package_source }}
          TAG_NAME_INPUT: ${{ inputs.tag_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $releaseMetadata = [ordered]@{
            tool = "PACX"
            package = "pacx.release.bundle"
            version = $env:RELEASE_VERSION
            purpose = "staged release bundle"
            source = "repository"
            tagName = $env:TAG_NAME_INPUT
            commitSha = $env:COMMIT_SHA
            repository = $env:REPOSITORY
            runId = $env:RUN_ID
            runNumber = $env:RUN_NUMBER
            generatedAtUtc = (Get-Date).ToUniversalTime().ToString("o")
          }

          $releaseMetadata | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath (Join-Path $env:PACKAGE_SOURCE "data/release.json") -Encoding utf8

      - name: Stage package release
        shell: pwsh
        env:
          PACKAGE_SOURCE: ${{ steps.prepare_source.outputs.package_source }}
          DESTINATION: ${{ inputs.destination }}
        run: |
          dotnet run --project Greg.Xrm.Command/Greg.Xrm.Command.csproj -- package release `
            -p "$env:PACKAGE_SOURCE" `
            -d "$env:DESTINATION" `
            --version "$env:RELEASE_VERSION" `
            --force

      - name: Resolve staged release directory
        id: resolve_release
        shell: pwsh
        env:
          DESTINATION: ${{ inputs.destination }}
        run: |
          $releaseRoot = Resolve-Path -LiteralPath $env:DESTINATION
          $releaseDir = Get-ChildItem -LiteralPath $releaseRoot -Directory | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if (-not $releaseDir) {
            throw "No staged release directory was created under $releaseRoot."
          }
          "release_dir=$($releaseDir.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload package release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pacx-package-release
          if-no-files-found: error
          retention-days: 30
          path: ${{ steps.resolve_release.outputs.release_dir }}/*

      - name: Create GitHub Release
        if: inputs.tag_name != ''
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: PACX package release ${{ inputs.tag_name }}
          files: ${{ steps.resolve_release.outputs.release_dir }}/*
