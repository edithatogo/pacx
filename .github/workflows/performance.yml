name: Performance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'

permissions:
  contents: read

jobs:
  benchmarks:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 11.0.100-preview.3.26207.106

      - name: Run startup benchmarks
        run: dotnet run --configuration Release --project Greg.Xrm.Command/test/Greg.Xrm.Command.Benchmark/Greg.Xrm.Command.Benchmark.csproj -- --filter '*Startup*' --artifacts ./bench/artifacts

      - name: Run core hot-path benchmarks
        run: dotnet run --configuration Release --project Greg.Xrm.Command/Greg.Xrm.Command.Core.Benchmarks/Greg.Xrm.Command.Core.Benchmarks.csproj -- --artifacts ./bench/artifacts

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-results
          path: bench/artifacts/**/*
          if-no-files-found: ignore
