name: PACX Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: Optional tag name to publish
        required: false
        type: string
        default: ""
      dry_run:
        description: Run the release flow without publishing NuGet packages or creating a GitHub Release
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Optional tag name to publish
        required: false
        type: string
        default: ""
      dry_run:
        description: Run the release flow without publishing NuGet packages or creating a GitHub Release
        required: false
        type: boolean
        default: false

permissions: read-all

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  # Dual-targeting strategy: the solution targets net10.0 and net11.0.
  # The validate stage uses the 11.0.x SDK (latest stable) to build all TFMs.
  # The Dockerfile publishes only the net11.0 TFM for the runtime-deps image.
  # The publish stage also uses 11.0.x for consistency — no reason to pin older SDK.
  validate:
    uses: ./.github/workflows/_build.yml
    with:
      solution_path: Greg.Xrm.Command/Greg.Xrm.Command.sln
      dotnet_version: 11.0.x
      collect_coverage: true

  coverage:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-cobertura
          path: coverage

      - name: Summarize coverage
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: coverage/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage/coverage.cobertura.xml
          use_oidc: true
          fail_ci_if_error: true

      - name: Enforce coverage threshold
        shell: pwsh
        run: |
          $thresholdFile = Join-Path $PWD "coverage-threshold.yml"
          if (-not (Test-Path -LiteralPath $thresholdFile)) {
            throw "Missing coverage threshold file: $thresholdFile"
          }

          $thresholdContent = Get-Content -LiteralPath $thresholdFile -Raw
          if ($thresholdContent -notmatch 'minimum_line_coverage:\s*(\d+(?:\.\d+)?)') {
            throw "Unable to parse minimum_line_coverage from $thresholdFile."
          }

          $minimum = [double]$Matches[1]
          [xml]$coverage = Get-Content -LiteralPath "coverage/coverage.cobertura.xml" -Raw
          $lineRate = [double]::Parse($coverage.coverage.'line-rate', [System.Globalization.CultureInfo]::InvariantCulture) * 100

          if ($lineRate -lt $minimum) {
            throw "Line coverage $([math]::Round($lineRate, 2))% is below the required threshold of $minimum%."
          }

  release_gate:
    needs: coverage
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Clear stale SDK overrides
        shell: pwsh
        run: Remove-Item Env:MSBuildSDKsPath -ErrorAction SilentlyContinue

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '11.0.x'

      - name: Run release gate validation
        shell: pwsh
        run: |
          Write-Host "Running assembly signing and release gate validation..."
          dotnet test Greg.Xrm.Command/Greg.Xrm.Command.sln `
            --configuration Release `
            --filter "FullyQualifiedName~PacxAssemblySigningTest|FullyQualifiedName~PacxPackageReleaseGateTest"
          if ($LASTEXITCODE -ne 0) {
            throw "Release gate validation failed. Signing or gate tests did not pass."
          }
          Write-Host "All release gates passed."

  publish:
    needs: release_gate
    runs-on: windows-latest
    environment: production-nuget
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      hashes: ${{ steps.subjects.outputs.hashes }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Clear stale SDK overrides
        shell: pwsh
        run: Remove-Item Env:MSBuildSDKsPath -ErrorAction SilentlyContinue

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '11.0.x'

      - name: Derive release version
        id: version
        shell: pwsh
        run: |
          $tagName = "${{ inputs.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tagName)) {
            if ("${{ github.event_name }}" -eq "workflow_call") {
              throw "workflow_call requires tag_name when dry_run is not explicitly provided."
            }

            if ("${{ github.ref_type }}" -ne "tag") {
              throw "workflow_dispatch requires tag_name when the workflow is not triggered by a tag push."
            }

            $tagName = $env:GITHUB_REF_NAME
          }

          $version = $tagName.TrimStart('v')
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "VersionNumber=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore Greg.Xrm.Command/Greg.Xrm.Command.sln

      - name: Pack artifacts
        run: |
          dotnet pack Greg.Xrm.Command/Greg.Xrm.Command.csproj --configuration Release -p:VersionNumber=${{ steps.version.outputs.version }} --output ./artifacts
          dotnet pack Greg.Xrm.Command/Greg.Xrm.Command.Interfaces/Greg.Xrm.Command.Interfaces.csproj --configuration Release -p:VersionNumber=${{ steps.version.outputs.version }} --output ./artifacts

      - name: Install CycloneDX
        shell: pwsh
        run: dotnet tool install --tool-path "$env:RUNNER_TEMP\tools" CycloneDX --version 6.1.1

      - name: Generate CycloneDX SBOM
        id: sbom
        shell: pwsh
        run: |
          $sbomDir = Join-Path $PWD "artifacts\sbom"
          New-Item -ItemType Directory -Force -Path $sbomDir | Out-Null

          & "$env:RUNNER_TEMP\tools\dotnet-CycloneDX.exe" "Greg.Xrm.Command/Greg.Xrm.Command.sln" `
            --output "$sbomDir" `
            --filename "pacx.${{ steps.version.outputs.version }}.sbom.xml" `
            --exclude-test-projects `
            --no-serial-number `
            --disable-package-restore `
            --github-bearer-token "${{ github.token }}" `
            --set-name PACX `
            --set-version "${{ steps.version.outputs.version }}"

          $sbomFile = Join-Path $sbomDir "pacx.${{ steps.version.outputs.version }}.sbom.xml"
          if (-not (Test-Path -LiteralPath $sbomFile)) {
            throw "Expected SBOM file was not created: $sbomFile"
          }

          "sbom_file=$sbomFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve package files
        id: package_files
        shell: pwsh
        run: |
          $cliPackage = Get-ChildItem -LiteralPath ./artifacts -Filter "Greg.Xrm.Command.${{ steps.version.outputs.version }}.nupkg" | Select-Object -First 1
          if (-not $cliPackage) {
            throw "Could not find the CLI package for version ${{ steps.version.outputs.version }} under ./artifacts."
          }

          $interfacesPackage = Get-ChildItem -LiteralPath ./artifacts -Filter "Greg.Xrm.Command.Interfaces*.nupkg" | Sort-Object Name | Select-Object -First 1
          if (-not $interfacesPackage) {
            throw "Could not find the interfaces package under ./artifacts."
          }

          "cli_package=$($cliPackage.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "interfaces_package=$($interfacesPackage.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate provenance subjects
        id: subjects
        shell: pwsh
        run: |
          function Get-RelativeSubject([string]$path) {
            $fullPath = (Resolve-Path -LiteralPath $path).Path
            $hash = (Get-FileHash -LiteralPath $fullPath -Algorithm SHA256).Hash.ToLowerInvariant()
            $relative = [System.IO.Path]::GetRelativePath($PWD, $fullPath).Replace('\', '/')
            return "$hash  $relative"
          }

          $subjects = @(
            Get-RelativeSubject "${{ steps.package_files.outputs.cli_package }}"
            Get-RelativeSubject "${{ steps.package_files.outputs.interfaces_package }}"
            Get-RelativeSubject "${{ steps.sbom.outputs.sbom_file }}"
          ) -join "`n"

          $hashes = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($subjects))
          "hashes=$hashes" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Sign release assets with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: |
            ${{ steps.package_files.outputs.cli_package }}
            ${{ steps.package_files.outputs.interfaces_package }}
            ${{ steps.sbom.outputs.sbom_file }}
          upload-signing-artifacts: true

      - name: NuGet login
        if: ${{ !inputs.dry_run }}
        id: nuget_login
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
        with:
          user: ${{ github.repository_owner }}

      - name: Push CLI package
        if: ${{ !inputs.dry_run }}
        run: dotnet nuget push "${{ steps.package_files.outputs.cli_package }}" --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push interfaces package
        if: ${{ !inputs.dry_run }}
        run: dotnet nuget push "${{ steps.package_files.outputs.interfaces_package }}" --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish preview
        if: ${{ inputs.dry_run }}
        shell: pwsh
        run: |
          Write-Host "Dry-run release requested."
          Write-Host "Tag: ${{ steps.version.outputs.tag_name }}"
          Write-Host "Version: ${{ steps.version.outputs.version }}"
          Write-Host "CLI package: ${{ steps.package_files.outputs.cli_package }}"
          Write-Host "Interfaces package: ${{ steps.package_files.outputs.interfaces_package }}"
          Write-Host "SBOM: ${{ steps.sbom.outputs.sbom_file }}"

      - name: Draft release notes
        id: release_drafter
        uses: release-drafter/release-drafter@a6a982fee9675c45c1765e9fa5308f7d6c3ecbd4 # v7.2.0
        with:
          config-name: .github/release-drafter.yml

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: PACX ${{ steps.version.outputs.version }}
          body: ${{ steps.release_drafter.outputs.body }}
          files: |
            ${{ steps.package_files.outputs.cli_package }}
            ${{ steps.package_files.outputs.interfaces_package }}
            ${{ steps.sbom.outputs.sbom_file }}

  package_release:
    needs: publish
    uses: ./.github/workflows/package-release.yml
    with:
      package_path: conductor/release-package
      destination: ./release-artifacts
      tag_name: ${{ needs.publish.outputs.tag_name }}
    permissions:
      contents: write

  provenance:
    needs: publish
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.10.0
    with:
      base64-subjects: ${{ needs.publish.outputs.hashes }}
      upload-assets: true
      upload-tag-name: ${{ needs.publish.outputs.tag_name }}
