name: SonarCloud Analysis
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  security-events: write
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
          submodules: false
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Greg.Xrm.Command/Greg.Xrm.Command.sln
      - name: Build
        run: dotnet build Greg.Xrm.Command/Greg.Xrm.Command.sln --no-restore
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@0e6c95efcf1dc0be59ac7e6cb34ff4a21d19f9b5 # v3.1.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=edithatogo
            -Dsonar.projectKey=edithatogo_pacx
            -Dsonar.projectName=PACX
            -Dsonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
            -Dsonar.coverage.exclusions=**/*Test*.cs
            -Dsonar.exclusions=**/*.g.cs,**/obj/**
