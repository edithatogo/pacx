name: Upstream Sync Evidence

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch canonical upstream
        shell: bash
        run: |
          git remote add upstream https://github.com/neronotte/Greg.Xrm.Command.git
          git fetch upstream --prune
      - name: Produce sync evidence
        shell: pwsh
        run: ./scripts/Test-UpstreamSync.ps1 | Tee-Object upstream-sync.json
      - name: Upload sync evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upstream-sync-evidence
          if-no-files-found: error
          retention-days: 14
          path: upstream-sync.json
