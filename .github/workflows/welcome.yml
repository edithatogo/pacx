name: Welcome First-Time Contributors

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

concurrency:
  group: welcome-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  welcome:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required to post the first-issue message.
      pull-requests: write # Required to post the first-PR message.
    steps:
      - uses: actions/first-interaction@fb2402657b4a28582200150d0a145671d0e50597 # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue in PACX. Please use the issue templates where possible and include repro steps or context.
          pr-message: |
            Thanks for opening your first pull request in PACX. Please use the PR template and include test evidence and upstream impact where relevant.
