name: PACX Release Smoke

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Smoke tag to simulate
        required: false
        type: string
        default: v0.0.0-ci-smoke

jobs:
  smoke:
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ inputs.tag_name }}
      dry_run: true
