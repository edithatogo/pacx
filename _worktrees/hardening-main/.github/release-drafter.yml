name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "bug"
      - "fix"
      - "bugfix"
  - title: "Maintenance"
    labels:
      - "chore"
      - "maintenance"
change-template: "- $TITLE (#$NUMBER)"
template: |
  ## What Changed

  $CHANGES

  ## Notes

  - Built and published by PACX release automation.
